<div
  class="min-h-screen bg-slate-100 flex items-center justify-center p-4"
>
  <form
    [formGroup]="form"
    (ngSubmit)="login()"
    class="bg-white w-full max-w-md rounded-2xl shadow-lg p-8"
  >
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-slate-800">
        NIRA Dashboard
      </h1>

      <p class="text-slate-500 mt-2">
        Faça login para continuar
      </p>
    </div>

    <div class="space-y-4">
      <input
        type="email"
        formControlName="email"
        placeholder="Email"
        class="w-full border border-slate-300 rounded-xl px-4 py-3"
      />

      <input
        type="password"
        formControlName="senha"
        placeholder="Senha"
        class="w-full border border-slate-300 rounded-xl px-4 py-3"
      />
    </div>

    @if (error) {
    <div
      class="bg-red-50 text-red-600 rounded-lg p-3 mt-4 text-sm"
    >
      {{ error }}
    </div>
    }

    <button
      type="submit"
      [disabled]="loading"
      class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-3 font-medium transition"
    >
      @if (loading) {
      Entrando...
      } @else {
      Entrar
      }
    </button>
  </form>
</div>
